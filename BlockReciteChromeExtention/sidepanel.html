<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary Side Panel</title>
    <style>
      /* 飞书简洁风格 - Sidepanel */
      body {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        height: 100vh;
        margin: 0;
        background-color: #FFFFFF;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        padding: 0;
      }
      
      /* 头部样式 */
      h1 {
        color: #1F2329;
        margin: 0;
        padding: 16px 20px 12px 20px;
        font-size: 20px;
        font-weight: 600;
        border-bottom: 1px solid #E5E7EB;
        background-color: #FFFFFF;
      }
      
      hr {
        display: none;
      }
      
      /* 主内容区 */
      body > * {
        padding-left: 16px;
        padding-right: 16px;
      }
      
      body > h1 {
        padding-left: 20px;
        padding-right: 20px;
      }
      
      #definition-word {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        font-size: 15px;
        margin: 16px 0;
        padding: 12px;
        background: #FAFAFA;
        border-radius: 4px;
        min-height: 40px;
        z-index: 10;
        position: relative;
      }
      
      .word-button {
        border: 1px solid #E5E7EB;
        background: #FFFFFF;
        font: inherit;
        cursor: pointer;
        display: inline-block;
        transition: border-color 0.2s;
        line-height: 1.5;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 15px;
        color: #1F2329;
      }
      
      .word-button:hover {
        font-weight: normal;
        color: #1F2329;
        background-color: #FFFFFF;
        border: 1px solid #799FB5;
        border-radius: 4px;
        box-shadow: none;
      }
      
      .word-explain {
        display: flex;
        align-items: center;
        margin-top: 8px;
        gap: 8px;
      }
      
      .word-explain p {
        margin: 0;
        font-weight: 500;
        font-size: 13px;
        color: #646A73;
        min-width: 40px;
      }
      
      .word-explain-item {
        display: flex;
        align-items: center;
        background-color: white;
        padding: 8px;
        border: 1px solid #E5E7EB;
        border-radius: 4px;
        transition: border-color 0.2s;
      }
      
      .word-explain-item:hover {
        box-shadow: none;
        transform: none;
        border-color: #799FB5;
      }
      
      .word-explain-input {
        width: 100%;
        height: 28px;
        padding: 0 12px;
        font-size: 13px;
        border: 1px solid #E5E7EB;
        border-radius: 4px;
        transition: border-color 0.2s;
        box-shadow: none;
        background-color: #FAFAFA;
      }
      
      .word-explain-input:focus {
        border-color: #799FB5;
        box-shadow: none;
        outline: none;
      }
      
      .word-explain-del {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 0;
        width: 28px;
        height: 28px;
        background-color: #F56C6C;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        transition: opacity 0.2s;
        box-shadow: none;
      }
      
      .word-explain-del:hover {
        opacity: 0.85;
        transform: none;
        box-shadow: none;
      }
      
      .word-explain-del:active {
        opacity: 0.7;
        transform: none;
      }
      
      #definition-explain {
        width: 100%;
        height: 64px;
        padding: 8px 12px;
        font-size: 13px;
        border: 1px solid #E5E7EB;
        border-radius: 4px;
        box-shadow: none;
        transition: border-color 0.2s;
        background-color: #FFFFFF;
        resize: vertical;
      }
      
      #definition-explain:focus {
        border-color: #799FB5;
        outline: none;
        box-shadow: none;
      }
      
      #make-card {
        width: auto;
        min-width: 120px;
        max-width: 200px;
        height: 36px;
        padding: 0 20px;
        font-size: 14px;
        font-weight: 500;
        color: white;
        background-color: #799FB5;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: opacity 0.2s;
        box-shadow: none;
        margin: 16px auto 0 auto;
        display: block;
      }
      
      #make-card:hover {
        opacity: 0.85;
        transform: none;
        box-shadow: none;
      }
      
      #make-card:active {
        opacity: 0.7;
        transform: none;
      }
      
      .checkbox-container {
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 16px 0;
        gap: 8px;
      }
      
      #front-type {
        width: 16px;
        height: 16px;
        cursor: pointer;
        accent-color: #799FB5;
        border-radius: 3px;
      }
      
      label {
        font-size: 14px;
        color: #1F2329;
      }
      
      #select-a-word {
        color: #646A73;
        font-size: 14px;
        margin: 12px 0;
      }
      
      input[type="text"] {
        padding: 0 12px;
        height: 32px;
        border: 1px solid #E5E7EB;
        border-radius: 4px;
        font-size: 13px;
        transition: border-color 0.2s;
        width: 100%;
        box-sizing: border-box;
        background-color: #FFFFFF;
      }
      
      input[type="text"]:focus {
        border-color: #799FB5;
        box-shadow: none;
        outline: none;
      }
      
      /* 编辑区域样式 */
      #text-edit-area {
        width: 100%;
        min-height: 120px;
        padding: 12px;
        border: 1px solid #E5E7EB;
        border-radius: 4px;
        font-size: 14px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        line-height: 1.6;
        resize: vertical;
        display: none;
        margin-bottom: 12px;
        background-color: #FAFAFA;
      }
      
      #text-edit-area:focus {
        border-color: #799FB5;
        box-shadow: none;
        outline: none;
      }
      
      .control-buttons {
        display: flex;
        gap: 8px;
        margin: 16px 0 12px 0;
      }
      
      .control-btn {
        flex: 1;
        height: 32px;
        padding: 0 16px;
        font-size: 13px;
        font-weight: 500;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: opacity 0.2s;
        box-shadow: none;
      }
      
      .edit-btn {
        background-color: #FFFFFF;
        color: #799FB5;
        border: 1px solid #799FB5;
      }
      
      .edit-btn:hover {
        opacity: 0.85;
        transform: none;
      }
      
      .retranslate-btn {
        background-color: #FC9D5D;
      }
      
      .retranslate-btn:hover {
        opacity: 0.85;
        transform: none;
      }
      
      .save-btn {
        background-color: #799FB5;
      }
      
      .save-btn:hover {
        opacity: 0.85;
        transform: none;
      }
      
      /* 单词释义容器样式 */
      #words-container {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      
      .word-explain-item {
        padding: 8px;
        background: white;
        border: 1px solid #E5E7EB;
        border-radius: 4px;
        cursor: pointer;
        transition: border-color 0.2s, background-color 0.2s;
      }
      
      .word-explain-item:hover {
        background: #FAFAFA;
        border-color: #799FB5;
      }
      
      /* 标签样式 */
      label {
        font-size: 14px;
        color: #1F2329;
        font-weight: normal;
      }
    </style>
  </head>

  <body>
    <h1>Block Recite</h1>
    <p id="select-a-word">Select a word to see the definition.</p>
    
    <!-- 控制按钮 -->
    <div class="control-buttons" id="control-buttons" style="display: none;">
      <button class="control-btn edit-btn" id="toggle-edit-btn">编辑文本</button>
      <button class="control-btn retranslate-btn" id="retranslate-btn" style="display: none;">重新翻译</button>
    </div>
    
    <!-- 编辑区域 -->
    <textarea id="text-edit-area"></textarea>
    
    <!-- 选中的文本单词显示区域 -->
    <div id="definition-word"></div>
    
    <!-- 翻译释义输入 -->
    <div style="margin: 16px 0;">
      <label style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: #1F2329;">翻译释义</label>
      <input type="text" id="definition-explain" placeholder="输入或编辑翻译...">
    </div>
    
    <!-- 单词释义列表 -->
    <div style="margin: 16px 0;">
      <label style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: #1F2329;">单词释义</label>
      <div id="words-container"></div>
    </div>

    <!-- 音频选项 -->
    <div class="checkbox-container">
        <input id="front-type" type="checkbox">
        <label>音频</label>
    </div>
    
    <!-- Make Card按钮 -->
    <button id="make-card">Make Card</button>

    <script src="js/trans_api/baidu_api.js"></script>
    <script src="sidepanel.js"></script>

  </body>
</html>
