<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary Side Panel</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #f5f5dc;
        font-family: Arial, sans-serif;
        padding: 20px;
      }
      #definition-word {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        font-size: 20px;
      }
      .word-button {
        border: none;
        background: none;
        font: inherit;
        cursor: pointer;
        display: inline-block;
        transition: all 0.3s ease;
        line-height: 1.5;
      }
      .word-button:hover {
        font-weight: bold;
        color: black;
        background-color: #f0f0f0;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
      }
      .word-explain {
        display: flex;
        align-items: center;
        margin-top: 15px;
        gap: 10px;
      }
      .word-explain p {
        margin: 0;
        font-weight: 600;
        color: #333;
        min-width: 60px;
      }
      .word-explain-item {
        display: flex;
        align-items: center;
        background-color: white;
        padding: 8px;
        border-radius: 5px;
        transition: all 0.3s ease;
      }
      .word-explain-item:hover {
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        transform: translateY(-1px);
      }
      .word-explain-input {
        width: 200px;
        height: auto;
        padding: 8px 12px;
        font-size: 16px;
        border: 2px solid #ddd;
        border-radius: 5px;
        transition: all 0.3s ease;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      .word-explain-input:focus {
        border-color: #4CAF50;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        outline: none;
      }
      .word-explain-del {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 0 5px;
        padding: 8px 15px;
        background-color: #dc3545;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s ease;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      .word-explain-del:hover {
        background-color: #c82333;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }
      .word-explain-del:active {
        transform: translateY(0);
      }
      #definition-explain {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border: 2px solid #ccc;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        transition: border-color 0.3s ease;
      }
      #definition-explain:focus {
        border-color: #007bff;
        outline: none;
      }
      #make-card {
        padding: 10px 20px;
        font-size: 16px;
        color: white;
        background-color: #4CAF50;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        margin-top: 15px;
      }
      #make-card:hover {
        background-color: #45a049;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }
      #make-card:active {
        transform: translateY(0);
      }
      .checkbox-container {
        display: flex;
        align-items: center;
        margin: 15px 0;
        gap: 8px;
      }
      #front-type {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: #4CAF50;
      }
      label {
        font-size: 16px;
        color: #333;
      }
      h1 {
        color: #2c3e50;
        margin-bottom: 20px;
        font-size: 28px;
      }
      hr {
        border: none;
        height: 2px;
        background: linear-gradient(to right, transparent, #4CAF50, transparent);
        margin: 20px 0;
        width: 80%;
      }
      #select-a-word {
        color: #666;
        font-size: 16px;
        margin: 10px 0;
      }
      input[type="text"] {
        padding: 10px 15px;
        border: 2px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        transition: all 0.3s ease;
        width: 100%;
        box-sizing: border-box;
      }
      input[type="text"]:focus {
        border-color: #4CAF50;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        outline: none;
      }
      /* 编辑区域样式 */
      #text-edit-area {
        width: 100%;
        min-height: 200px;
        padding: 15px;
        border: 2px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        font-family: Arial, sans-serif;
        line-height: 1.6;
        resize: vertical;
        display: none;
        margin-bottom: 10px;
      }
      #text-edit-area:focus {
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        outline: none;
      }
      .control-buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
      }
      .control-btn {
        padding: 8px 16px;
        font-size: 14px;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }
      .edit-btn {
        background-color: #667eea;
      }
      .edit-btn:hover {
        background-color: #5568d3;
        transform: translateY(-2px);
      }
      .retranslate-btn {
        background-color: #ff9800;
      }
      .retranslate-btn:hover {
        background-color: #e68900;
        transform: translateY(-2px);
      }
      .save-btn {
        background-color: #4CAF50;
      }
      .save-btn:hover {
        background-color: #45a049;
        transform: translateY(-2px);
      }
      /* 确认对话框样式 */
      .confirm-dialog {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        z-index: 10000;
        min-width: 300px;
        display: none;
      }
      .confirm-dialog.show {
        display: block;
      }
      .dialog-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9999;
        display: none;
      }
      .dialog-overlay.show {
        display: block;
      }
      .dialog-title {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 15px;
        color: #2c3e50;
      }
      .dialog-content {
        margin-bottom: 20px;
        color: #666;
        line-height: 1.5;
      }
      .dialog-buttons {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }
      .dialog-btn {
        padding: 8px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s ease;
      }
      .dialog-btn-yes {
        background-color: #4CAF50;
        color: white;
      }
      .dialog-btn-yes:hover {
        background-color: #45a049;
      }
      .dialog-btn-no {
        background-color: #dc3545;
        color: white;
      }
      .dialog-btn-no:hover {
        background-color: #c82333;
      }
      .dialog-timer {
        font-size: 12px;
        color: #999;
        margin-top: 10px;
        text-align: right;
      }
    </style>
  </head>

  <body>
    <h1>Block Recide</h1>
    <hr/>
    <p id="select-a-word">Select a word to see the definition.</p>
    
    <!-- 控制按钮 -->
    <div class="control-buttons" id="control-buttons" style="display: none;">
      <button class="control-btn edit-btn" id="toggle-edit-btn">编辑文本</button>
      <button class="control-btn retranslate-btn" id="retranslate-btn" style="display: none;">重新翻译</button>
    </div>
    
    <!-- 剪切板提示和手动检查按钮 -->
    <div id="clipboard-hint" style="display: none; background-color: #e3f2fd; padding: 10px; border-radius: 5px; margin-bottom: 10px; font-size: 13px; color: #1976d2; border: 1px solid #90caf9;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <span>💡 提示：复制文字后按 <kbd style="background: white; padding: 2px 6px; border: 1px solid #ccc; border-radius: 3px;">Ctrl+V</kbd> 更新内容</span>
        <button id="check-clipboard-btn" style="padding: 5px 12px; background: #1976d2; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px;">检查剪切板</button>
      </div>
    </div>
    
    <!-- 编辑区域 -->
    <textarea id="text-edit-area"></textarea>
    
    <div>
      <p id="definition-word"></p>
      <input type="text" id="definition-explain" placeholder="Enter definition here...">
    </div>
    <div id="words-container"></div>

    <div class="checkbox-container">
        <input id="front-type" type="checkbox">
        <label>音频</label>
    </div>
    <button id="make-card">Make Card</button>

    <!-- 确认对话框 -->
    <div class="dialog-overlay" id="dialog-overlay"></div>
    <div class="confirm-dialog" id="confirm-dialog">
      <div class="dialog-title">检测到剪切板变化</div>
      <div class="dialog-content">
        检测到剪切板有新内容，是否使用新内容重新翻译？
      </div>
      <div class="dialog-buttons">
        <button class="dialog-btn dialog-btn-yes" id="dialog-yes">是</button>
        <button class="dialog-btn dialog-btn-no" id="dialog-no">否</button>
      </div>
      <div class="dialog-timer" id="dialog-timer">10秒后自动关闭</div>
    </div>

    <script src="js/trans_api/baidu_api.js"></script>
    <script src="sidepanel.js"></script>

  </body>
</html>
